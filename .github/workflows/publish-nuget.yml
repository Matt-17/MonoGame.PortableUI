name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore MonoGame.PortableUI.slnx

      - name: Build
        run: dotnet build MonoGame.PortableUI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MonoGame.PortableUI.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/MonoGame.PortableUI/MonoGame.PortableUI.csproj --configuration Release --no-build --output artifacts/packages

      - name: Validate package
        shell: pwsh
        run: ./eng/validate-package.ps1 -PackageDirectory artifacts/packages

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
