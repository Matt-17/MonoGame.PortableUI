name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore MonoGame.PortableUI.slnx

      - name: Build
        run: dotnet build MonoGame.PortableUI.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test MonoGame.PortableUI.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/MonoGame.PortableUI/MonoGame.PortableUI.csproj --configuration Release --no-build --output artifacts/packages

      - name: Validate package
        shell: pwsh
        run: ./eng/validate-package.ps1 -PackageDirectory artifacts/packages

      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: artifacts/packages
